<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 16px; }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        button {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 16px;
            margin: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>#BitcoinBastion Dashboard</h1>
        <p>Welcome! Use the buttons below to explore data.</p>
        <div class="card">
            <h3>Market Overview</h3>
            <button id="btcBtn">Show BTC Price</button>
            <button id="fearGreedBtn">Fear & Greed</button>
        </div>
        <div id="result"></div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const resultDiv = document.getElementById('result');
        document.getElementById('btcBtn').addEventListener('click', () => {
            resultDiv.innerText = 'Fetching BTC price...';
            // Здесь можно сделать запрос к вашему API
            fetch('/api/health').then(r => r.json()).then(data => {
                resultDiv.innerText = JSON.stringify(data, null, 2);
            });
        });
        tg.ready();
    </script>
</body>
</html>
